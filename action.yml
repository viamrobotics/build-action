name: Viam cloud build
description: Build and publish your Viam module on multiple platforms.

inputs:
  meta-path:
    description: location of module metadata. set to empty string to not use
    default: meta.json
  key-id:
    description: ID of your auth key
    required: true
  key-value:
    description: secret value of your auth key
    required: true
  version:
    description: Version to set for the module. If missing, your module will build but not upload.
  ref:
    description: The git ref to build. This will usually be a sha, but can be a branch or anything supported by git checkout.
  token:
    description: Pass `github.token` if this is a private repository.
  workdir:
    description: Use this if your module is not in the repo root. If you pass this, the `meta-path` will be relative to this workdir, not to repo root.
  skip-login:
    description: The action will automatically run `viam login` to login to your Viam account. If you pass this, the action will not run `viam login`.
  skip-update:
    description: The action will automatically run `viam module update` to update cloud metadata for your module using the latest `meta.json file. If you pass this, the action will not run `viam module update`.
  skip-download:
    description: The action will automatically download the Viam CLI. If you pass this, the action will not download the Viam CLI.

runs:
  using: node20
  main: 'dist/index.js'

branding:
  icon: upload-cloud
